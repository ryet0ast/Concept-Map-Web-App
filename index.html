<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Mindmap</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
    min-height: 100vh;
    overflow: hidden;
    color: #fff;
  }

  /* ── Setup Screen ── */
  #setup-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    overflow-y: auto;
  }

  .setup-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 2.5rem 3rem;
    width: 100%;
    max-width: 460px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }

  .setup-card h1 {
    font-size: 1.8rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 0.3rem;
    letter-spacing: -0.5px;
  }

  .setup-card .subtitle {
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 0.88rem;
    margin-bottom: 2rem;
  }

  /* ── Concept Count Stepper ── */
  .count-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.6rem;
    padding: 0.75rem 1rem;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .count-label {
    font-size: 0.85rem;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.02em;
  }

  .stepper {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .step-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .step-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.45); }
  .step-btn:disabled { opacity: 0.3; cursor: default; }

  #count-display {
    font-size: 1.15rem;
    font-weight: 700;
    min-width: 24px;
    text-align: center;
  }

  /* ── Concept Inputs ── */
  #concept-inputs { margin-bottom: 1.2rem; }

  .input-group { margin-bottom: 1.1rem; }

  .input-group label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 0.45rem;
  }

  .input-group input {
    width: 100%;
    padding: 0.7rem 1rem;
    border-radius: 10px;
    border: 2px solid transparent;
    background: rgba(255,255,255,0.07);
    color: #fff;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.18s, background 0.18s;
  }

  .input-group input::placeholder { color: rgba(255,255,255,0.28); }

  .begin-btn {
    width: 100%;
    padding: 0.85rem;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.02em;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 8px 24px rgba(59,130,246,0.35);
  }

  .begin-btn:hover { opacity: 0.92; transform: translateY(-1px); }
  .begin-btn:active { transform: translateY(0); }

  /* ── Main App ── */
  #app {
    display: none;
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* ── Toolbar ── */
  #toolbar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 50px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    white-space: nowrap;
  }

  .toolbar-hint {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.5);
    padding-right: 4px;
  }

  .tb-btn {
    padding: 6px 14px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.85);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }

  .tb-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }
  .tb-btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

  .tb-btn.active {
    background: rgba(109,40,217,0.7);
    border-color: #a78bfa;
    color: #fff;
    box-shadow: 0 0 12px rgba(139,92,246,0.5);
  }

  .tb-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.2);
    margin: 0 4px;
  }

  /* ── Export Dropdown ── */
  .tb-dropdown-wrap { position: relative; }

  #export-menu {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: rgba(15,20,40,0.97);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 5px 0;
    min-width: 160px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    z-index: 300;
  }

  /* ── Legend ── */
  #legend {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 22px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    flex-wrap: wrap;
    justify-content: center;
    max-width: 90vw;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.75);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-hint {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.4);
    padding-left: 8px;
    border-left: 1px solid rgba(255,255,255,0.15);
  }

  /* ── Canvas ── */
  #canvas {
    width: 100%;
    height: 100%;
    position: relative;
    cursor: default;
  }

  #svg-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  /* ── Bridge Zone ── */
  #bridge-zone {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 220px;
    height: 340px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(139,92,246,0.1) 0%, rgba(139,92,246,0.03) 60%, transparent 100%);
    border: 1px dashed rgba(139,92,246,0.2);
    pointer-events: none;
  }

  /* ── Nodes (shape only — colors applied via JS inline styles) ── */
  .node {
    position: absolute;
    padding: 10px 22px;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: grab;
    user-select: none;
    transform: translate(-50%, -50%);
    transition: outline 0.1s;
    white-space: nowrap;
    z-index: 10;
    letter-spacing: 0.01em;
  }

  .node:active { cursor: grabbing; }

  .node.root {
    font-size: 1.05rem;
    font-weight: 700;
    padding: 13px 28px;
  }

  .node.selected {
    outline: 3px solid rgba(255,255,255,0.88) !important;
    outline-offset: 2px;
  }

  .node.connect-source {
    outline: 3px solid rgba(167,139,250,0.9);
    outline-offset: 3px;
    animation: pulse-outline 1.2s ease-in-out infinite;
  }

  @keyframes pulse-outline {
    0%, 100% { outline-color: rgba(167,139,250,0.9); outline-offset: 3px; }
    50%       { outline-color: rgba(167,139,250,0.35); outline-offset: 6px; }
  }

  /* ── Context Menu ── */
  #ctx-menu {
    position: fixed;
    z-index: 200;
    background: rgba(15,20,40,0.97);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 6px 0;
    min-width: 175px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    display: none;
  }

  .ctx-item {
    padding: 9px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    color: rgba(255,255,255,0.82);
    transition: background 0.12s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ctx-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .ctx-item.danger { color: #f87171; }
  .ctx-item.danger:hover { background: rgba(239,68,68,0.15); }
  .ctx-separator { height: 1px; background: rgba(255,255,255,0.1); margin: 4px 0; }

  /* ── Inline Editor ── */
  .inline-editor {
    position: absolute;
    z-index: 50;
    transform: translate(-50%, -50%);
  }

  .inline-editor input {
    padding: 8px 18px;
    border-radius: 50px;
    border: 2px solid rgba(167,139,250,0.8);
    background: rgba(20,20,50,0.95);
    color: #fff;
    font-size: 0.88rem;
    font-family: inherit;
    font-weight: 600;
    outline: none;
    min-width: 130px;
    max-width: 250px;
    box-shadow: 0 0 18px rgba(139,92,246,0.4);
    text-align: center;
  }

  .inline-editor input::placeholder { color: rgba(255,255,255,0.35); }

  /* ── Print / PDF ── */
  @media print {
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
    body { background: #fff !important; }
    #toolbar, #legend, #bridge-zone { display: none !important; }
    #app { display: block !important; }
    .node { box-shadow: none !important; outline: none !important; }
  }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen">
  <div class="setup-card">
    <h1>Concept Mindmap</h1>
    <p class="subtitle">Brainstorm and connect ideas in the classroom</p>

    <div class="count-row">
      <span class="count-label">Number of Concepts</span>
      <div class="stepper">
        <button class="step-btn" id="step-minus" onclick="changeCount(-1)" disabled>−</button>
        <span id="count-display">2</span>
        <button class="step-btn" id="step-plus" onclick="changeCount(1)">+</button>
      </div>
    </div>

    <div id="concept-inputs"></div>

    <button class="begin-btn" onclick="beginMap()">Begin Brainstorming →</button>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div id="toolbar">
    <span class="toolbar-hint">Double-click to add node</span>
    <button class="tb-btn" id="connect-btn" onclick="toggleConnectMode()">⟷ Connect Nodes</button>
    <button class="tb-btn" onclick="clearSelection()">Clear Selection</button>
    <button class="tb-btn" id="undo-btn" onclick="undo()" disabled>↩ Undo</button>
    <div class="tb-divider"></div>
    <button class="tb-btn" onclick="newMap()">New Map</button>
    <div class="tb-dropdown-wrap">
      <button class="tb-btn" onclick="toggleExportMenu(event)">Export ▾</button>
      <div id="export-menu">
        <div class="ctx-item" onclick="exportPNG(); closeExportMenu()">🖼 Download PNG</div>
        <div class="ctx-item" onclick="window.print(); closeExportMenu()">📄 Print / PDF</div>
        <div class="ctx-separator"></div>
        <div class="ctx-item" onclick="saveMap(); closeExportMenu()">💾 Save Map (.json)</div>
        <div class="ctx-item" onclick="loadMapPicker(); closeExportMenu()">📂 Load Map…</div>
      </div>
    </div>
  </div>
  <input type="file" id="map-file-input" accept=".json" style="display:none" onchange="loadMapFromFile(event)">

  <div id="canvas"
    ondblclick="canvasDblClick(event)"
    onmousedown="canvasMouseDown(event)"
    onmousemove="canvasMouseMove(event)"
    onmouseup="canvasMouseUp(event)"
    onclick="canvasClick(event)"
    oncontextmenu="return false;"
  >
    <div id="bridge-zone"></div>
    <svg id="svg-layer"></svg>
  </div>

  <div id="legend"></div>
</div>

<!-- Context Menu -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxAction('add-child')">➕ Add Child</div>
  <div class="ctx-item" onclick="ctxAction('rename')">✏️ Rename</div>
  <div id="ctx-dynamic"></div>
  <div class="ctx-separator"></div>
  <div class="ctx-item danger" id="ctx-delete" onclick="ctxAction('delete')">🗑️ Delete Node</div>
</div>

<script>
// ── Color Palette ──────────────────────────────────────
const PALETTE = [
  { bg: ['#1d4ed8','#2563eb'], edge: '#60a5fa',  shadow: 'rgba(37,99,235,0.45)',   stroke: 'rgba(147,197,253,0.3)', label: '#93c5fd' },
  { bg: ['#c2410c','#ea580c'], edge: '#fb923c',  shadow: 'rgba(234,88,12,0.45)',   stroke: 'rgba(253,186,116,0.3)', label: '#fdba74' },
  { bg: ['#166534','#16a34a'], edge: '#4ade80',  shadow: 'rgba(22,163,74,0.45)',   stroke: 'rgba(134,239,172,0.3)', label: '#86efac' },
  { bg: ['#9d174d','#db2777'], edge: '#f472b6',  shadow: 'rgba(219,39,119,0.45)',  stroke: 'rgba(249,168,212,0.3)', label: '#f9a8d4' },
  { bg: ['#0e7490','#0891b2'], edge: '#22d3ee',  shadow: 'rgba(8,145,178,0.45)',   stroke: 'rgba(103,232,249,0.3)', label: '#67e8f9' },
  { bg: ['#92400e','#d97706'], edge: '#fbbf24',  shadow: 'rgba(217,119,6,0.45)',   stroke: 'rgba(252,211,77,0.3)',  label: '#fcd34d' },
];
const BRIDGE = { bg: ['#6d28d9','#7c3aed'], edge: '#c4b5fd', shadow: 'rgba(124,58,237,0.45)', stroke: 'rgba(196,181,253,0.3)', label: '#c4b5fd' };

function getPalette(node) {
  return node.conceptIdx === 'bridge' ? BRIDGE : PALETTE[node.conceptIdx % PALETTE.length];
}

// ── State ──────────────────────────────────────────────
const state = {
  nodes: [], edges: [],
  concepts: [],
  selected: null,
  connectMode: false, connectFrom: null,
  dragging: null, dragOffset: { x: 0, y: 0 }, dragStartPos: null,
  ctxTarget: null, nextId: 0,
  history: [], historyLimit: 50
};

function genId() { return 'n' + state.nextId++; }

// ── History / Undo ─────────────────────────────────────
function saveHistory() {
  state.history.push({
    nodes: JSON.parse(JSON.stringify(state.nodes)),
    edges: JSON.parse(JSON.stringify(state.edges))
  });
  if (state.history.length > state.historyLimit) state.history.shift();
  updateUndoBtn();
}

function popHistory() {
  state.history.pop();
  updateUndoBtn();
}

function undo() {
  if (state.history.length === 0) return;
  const snap = state.history.pop();
  state.nodes = snap.nodes;
  state.edges = snap.edges;
  state.selected = null;
  state.connectMode = false;
  state.connectFrom = null;
  updateConnectBtn();
  updateUndoBtn();
  renderAll();
}

function updateUndoBtn() {
  const btn = document.getElementById('undo-btn');
  if (btn) btn.disabled = state.history.length === 0;
}

// ── Setup ──────────────────────────────────────────────
let conceptCount = 1;

function changeCount(delta) {
  conceptCount = Math.max(1, Math.min(6, conceptCount + delta));
  document.getElementById('count-display').textContent = conceptCount;
  document.getElementById('step-minus').disabled = conceptCount <= 1;
  document.getElementById('step-plus').disabled  = conceptCount >= 6;
  renderSetupInputs();
}

function renderSetupInputs() {
  const container = document.getElementById('concept-inputs');
  // Preserve existing values
  const saved = [];
  for (let i = 0; i < 6; i++) {
    const el = document.getElementById(`ci${i}`);
    saved[i] = el ? el.value : '';
  }
  container.innerHTML = '';
  for (let i = 0; i < conceptCount; i++) {
    const p = PALETTE[i];
    const div = document.createElement('div');
    div.className = 'input-group';
    div.innerHTML = `<label style="color:${p.label}">Concept ${i + 1}</label>
      <input type="text" id="ci${i}" maxlength="40" placeholder="Enter a concept name" />`;
    container.appendChild(div);
    const inp = div.querySelector('input');
    inp.value = saved[i] || '';
    inp.addEventListener('focus', () => {
      inp.style.borderColor = p.bg[1];
      inp.style.background  = p.bg[1] + '22';
    });
    inp.addEventListener('blur', () => {
      inp.style.borderColor = 'transparent';
      inp.style.background  = 'rgba(255,255,255,0.07)';
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (i < conceptCount - 1) document.getElementById(`ci${i + 1}`).focus();
        else beginMap();
      }
    });
  }
}

// Init inputs on load
renderSetupInputs();

// ── Begin Map ──────────────────────────────────────────
function beginMap() {
  const concepts = [];
  for (let i = 0; i < conceptCount; i++) {
    const val = (document.getElementById(`ci${i}`)?.value || '').trim() || `Concept ${i + 1}`;
    concepts.push({ name: val });
  }
  state.concepts = concepts;
  state.nodes = []; state.edges = [];
  state.selected = null; state.connectMode = false; state.connectFrom = null; state.nextId = 0;

  const W = window.innerWidth, H = window.innerHeight;
  const n = concepts.length;
  for (let i = 0; i < n; i++) {
    let x;
    if (n === 1) {
      x = W * 0.5;
    } else {
      const pad = W * 0.12;
      x = pad + (i / (n - 1)) * (W - 2 * pad);
    }
    state.nodes.push({ id: genId(), text: concepts[i].name, x, y: H * 0.5, conceptIdx: i, parentId: null, isRoot: true });
  }

  buildLegend();
  document.getElementById('bridge-zone').style.display = n === 1 ? 'none' : '';
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  updateConnectBtn();
  renderAll();
}

function buildLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  state.concepts.forEach((c, i) => {
    const p = PALETTE[i];
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:linear-gradient(135deg,${p.bg[0]},${p.bg[1]})"></div><span>${c.name}</span>`;
    legend.appendChild(item);
  });
  const bridgeItem = document.createElement('div');
  bridgeItem.className = 'legend-item';
  bridgeItem.innerHTML = `<div class="legend-dot" style="background:linear-gradient(135deg,${BRIDGE.bg[0]},${BRIDGE.bg[1]})"></div><span>Bridge</span>`;
  legend.appendChild(bridgeItem);
  const hint = document.createElement('span');
  hint.className = 'legend-hint';
  hint.innerHTML = 'Dbl-click node to add child &bull; Drag to move &bull; Right-click for options';
  legend.appendChild(hint);
}

function newMap() {
  if (!confirm('Start a new map? All current work will be lost.')) return;
  state.nodes = []; state.edges = [];
  state.selected = null; state.connectMode = false; state.connectFrom = null;
  state.dragging = null; state.nextId = 0; state.history = [];
  document.querySelectorAll('.node').forEach(el => el.remove());
  document.getElementById('svg-layer').innerHTML = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  updateConnectBtn();
  updateUndoBtn();
  renderSetupInputs();
}

// ── Render ─────────────────────────────────────────────
function renderAll() { renderEdges(); renderNodes(); }

function renderEdges() {
  const svg = document.getElementById('svg-layer');
  svg.innerHTML = '';
  for (const edge of state.edges) {
    const from = state.nodes.find(n => n.id === edge.from);
    const to   = state.nodes.find(n => n.id === edge.to);
    if (!from || !to) continue;
    const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;
    const dx = to.x - from.x,   dy = to.y - from.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) continue;
    const curve = dist * 0.25;
    const cpx = mx + (-dy / dist) * curve;
    const cpy = my + ( dx / dist) * curve;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${from.x} ${from.y} Q ${cpx} ${cpy} ${to.x} ${to.y}`);
    path.setAttribute('fill', 'none');
    if (edge.type === 'connection') {
      path.setAttribute('stroke', '#a78bfa');
      path.setAttribute('stroke-width', '2');
      path.setAttribute('stroke-dasharray', '7 4');
      path.setAttribute('opacity', '0.8');
    } else {
      path.setAttribute('stroke', getPalette(from).edge);
      path.setAttribute('stroke-width', '2');
      path.setAttribute('opacity', '0.65');
    }
    svg.appendChild(path);
  }
}

function renderNodes() {
  document.querySelectorAll('.node').forEach(el => el.remove());
  document.querySelectorAll('.inline-editor').forEach(el => el.remove());
  const canvas = document.getElementById('canvas');
  for (const node of state.nodes) {
    const el = document.createElement('div');
    el.className = `node${node.isRoot ? ' root' : ''}`;
    if (state.selected === node.id) el.classList.add('selected');
    if (state.connectMode && state.connectFrom === node.id) el.classList.add('connect-source');
    applyNodeStyle(el, node);
    el.textContent = node.text;
    el.style.left = node.x + 'px';
    el.style.top  = node.y + 'px';
    el.dataset.id = node.id;
    el.addEventListener('dblclick',    (e) => { e.stopPropagation(); nodeDblClick(e, node.id); });
    el.addEventListener('mousedown',   (e) => { e.stopPropagation(); nodeMouseDown(e, node.id); });
    el.addEventListener('click',       (e) => { e.stopPropagation(); nodeClick(e, node.id); });
    el.addEventListener('contextmenu', (e) => { e.preventDefault(); e.stopPropagation(); showCtxMenu(e, node.id); });
    canvas.appendChild(el);
  }
}

function applyNodeStyle(el, node) {
  const p = getPalette(node);
  el.style.background = `linear-gradient(135deg, ${p.bg[0]}, ${p.bg[1]})`;
  el.style.boxShadow  = `0 4px 18px ${p.shadow}`;
  el.style.border     = `1.5px solid ${p.stroke}`;
  el.style.color      = '#fff';
}

// ── Interactions ───────────────────────────────────────
function nodeClick(e, id) {
  if (state.connectMode) {
    if (!state.connectFrom) {
      state.connectFrom = id; renderAll();
    } else if (state.connectFrom !== id) {
      const exists = state.edges.some(ed =>
        (ed.from === state.connectFrom && ed.to === id) ||
        (ed.from === id && ed.to === state.connectFrom)
      );
      if (!exists) { saveHistory(); state.edges.push({ id: genId(), from: state.connectFrom, to: id, type: 'connection' }); }
      state.connectFrom = null; state.connectMode = false;
      updateConnectBtn(); renderAll();
    }
    return;
  }
  state.selected = id; renderAll();
}

function nodeDblClick(e, id) { if (!state.connectMode) showInlineEditor(id, false); }

function canvasDblClick(e) {
  const t = e.target;
  const canvas = document.getElementById('canvas');
  const bz     = document.getElementById('bridge-zone');
  const svg    = document.getElementById('svg-layer');
  if (t !== canvas && t !== bz && t !== svg) return;
  if (state.connectMode) return;
  const id = genId();
  saveHistory();
  state.nodes.push({ id, text: '', x: e.clientX, y: e.clientY, conceptIdx: 'bridge', parentId: null, isRoot: false });
  state.selected = id;
  renderAll();
  showNewNodeEditor(id, e.clientX, e.clientY);
}

function canvasClick(e) {
  const t = e.target;
  const canvas = document.getElementById('canvas');
  const bz     = document.getElementById('bridge-zone');
  const svg    = document.getElementById('svg-layer');
  if (t === canvas || t === bz || t === svg) {
    state.selected = null;
    if (!state.connectMode) state.connectFrom = null;
    renderAll();
  }
}

function canvasMouseDown(e) {}

function nodeMouseDown(e, id) {
  if (e.button !== 0) return;
  state.dragging = id;
  const node = state.nodes.find(n => n.id === id);
  state.dragOffset = { x: e.clientX - node.x, y: e.clientY - node.y };
  state.dragStartPos = { x: node.x, y: node.y };
  state.selected = id;
  saveHistory();
}

function canvasMouseMove(e) {
  if (!state.dragging) return;
  const node = state.nodes.find(n => n.id === state.dragging);
  if (!node) return;
  node.x = Math.max(40, Math.min(window.innerWidth  - 40, e.clientX - state.dragOffset.x));
  node.y = Math.max(40, Math.min(window.innerHeight - 40, e.clientY - state.dragOffset.y));
  renderAll();
}

function canvasMouseUp() {
  if (state.dragging) {
    const node = state.nodes.find(n => n.id === state.dragging);
    if (node && state.dragStartPos &&
        node.x === state.dragStartPos.x && node.y === state.dragStartPos.y) {
      popHistory(); // click with no movement — discard the snapshot
    }
  }
  state.dragging = null;
  state.dragStartPos = null;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    state.connectMode = false; state.connectFrom = null; state.selected = null;
    updateConnectBtn(); renderAll();
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && document.activeElement.tagName !== 'INPUT') {
    if (state.selected) deleteNode(state.selected);
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault(); undo();
  }
});

// ── Connect Mode ───────────────────────────────────────
function toggleConnectMode() {
  state.connectMode = !state.connectMode;
  if (!state.connectMode) state.connectFrom = null;
  updateConnectBtn(); renderAll();
}

function updateConnectBtn() {
  const btn = document.getElementById('connect-btn');
  if (state.connectMode) {
    btn.textContent = '✕ Exit Connect Mode'; btn.classList.add('active');
  } else {
    btn.textContent = '⟷ Connect Nodes'; btn.classList.remove('active');
  }
}

function clearSelection() {
  state.selected = null; state.connectMode = false; state.connectFrom = null;
  updateConnectBtn(); renderAll();
}

// ── Child Placement ────────────────────────────────────
function childPosition(parent) {
  const W = window.innerWidth, H = window.innerHeight;
  const dist = 130 + Math.random() * 40;
  let baseAngle;
  if (parent.conceptIdx === 'bridge' || state.concepts.length === 1) {
    baseAngle = Math.random() * Math.PI * 2;
  } else {
    const dx = parent.x - W / 2, dy = parent.y - H / 2;
    const d  = Math.sqrt(dx * dx + dy * dy);
    baseAngle = d < 20 ? Math.random() * Math.PI * 2 : Math.atan2(dy, dx);
    baseAngle += (Math.random() - 0.5) * (Math.PI * 2 / 3);
  }
  return {
    x: Math.max(60, Math.min(W - 60, parent.x + Math.cos(baseAngle) * dist)),
    y: Math.max(60, Math.min(H - 60, parent.y + Math.sin(baseAngle) * dist))
  };
}

// ── Inline Editor ──────────────────────────────────────
function showInlineEditor(parentId, isRename) {
  const parent = state.nodes.find(n => n.id === parentId);
  if (!parent) return;
  if (isRename) { showRenameEditor(parentId); return; }
  const pos = childPosition(parent);
  const newId = genId();
  saveHistory(); // save BEFORE adding node so cancel can restore cleanly
  state.nodes.push({ id: newId, text: '', x: pos.x, y: pos.y, conceptIdx: parent.conceptIdx, parentId, isRoot: false });
  state.edges.push({ id: genId(), from: parentId, to: newId, type: 'hierarchy' });
  state.selected = newId;
  renderAll();
  showNewNodeEditor(newId, pos.x, pos.y);
}

// For new nodes (child or floating bridge) — caller must saveHistory() before adding node
function showNewNodeEditor(nodeId, x, y) {
  const canvas = document.getElementById('canvas');
  const wrap = document.createElement('div');
  wrap.className = 'inline-editor';
  wrap.style.left = x + 'px'; wrap.style.top = y + 'px';
  const inp = document.createElement('input');
  inp.type = 'text'; inp.placeholder = 'Type & press Enter'; inp.maxLength = 50;
  wrap.appendChild(inp); canvas.appendChild(wrap);
  inp.focus();

  let done = false;
  function finish(val) {
    if (done) return; done = true;
    wrap.remove();
    if (val) {
      const n = state.nodes.find(nd => nd.id === nodeId);
      if (n) n.text = val;
    } else {
      popHistory(); // discard snapshot — node never committed
      state.nodes = state.nodes.filter(nd => nd.id !== nodeId);
      state.edges = state.edges.filter(ed => ed.from !== nodeId && ed.to !== nodeId);
      state.selected = null;
    }
    renderAll();
  }

  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter')  { e.preventDefault(); finish(inp.value.trim()); }
    if (e.key === 'Escape') { e.preventDefault(); finish(''); }
    e.stopPropagation();
  });
  inp.addEventListener('blur', () => finish(inp.value.trim()));
}

// For renaming existing nodes — saves history only when text actually changes
function showRenameEditor(nodeId) {
  const node = state.nodes.find(n => n.id === nodeId);
  if (!node) return;
  const oldText = node.text;
  const canvas = document.getElementById('canvas');
  const wrap = document.createElement('div');
  wrap.className = 'inline-editor';
  wrap.style.left = node.x + 'px'; wrap.style.top = node.y + 'px';
  const inp = document.createElement('input');
  inp.type = 'text'; inp.placeholder = 'Type & press Enter'; inp.maxLength = 50;
  inp.value = oldText;
  wrap.appendChild(inp); canvas.appendChild(wrap);
  inp.focus(); inp.select();

  let done = false;
  function finish(val) {
    if (done) return; done = true;
    wrap.remove();
    if (val && val !== oldText) {
      saveHistory(); // state still has oldText at this point ✓
      node.text = val;
    }
    renderAll();
  }

  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter')  { e.preventDefault(); finish(inp.value.trim()); }
    if (e.key === 'Escape') { e.preventDefault(); finish(''); }
    e.stopPropagation();
  });
  inp.addEventListener('blur', () => finish(inp.value.trim()));
}

// ── Context Menu ───────────────────────────────────────
function showCtxMenu(e, id) {
  state.ctxTarget = id; state.selected = id; renderAll();
  const menu = document.getElementById('ctx-menu');
  const node = state.nodes.find(n => n.id === id);
  document.getElementById('ctx-delete').style.display = (node && node.isRoot) ? 'none' : 'flex';

  // Build dynamic middle section
  const dynSection = document.getElementById('ctx-dynamic');
  dynSection.innerHTML = '';
  if (node) {
    if (node.conceptIdx === 'bridge') {
      // Offer re-assignment to each concept
      state.concepts.forEach((c, i) => {
        const p = PALETTE[i];
        const item = document.createElement('div');
        item.className = 'ctx-item';
        item.innerHTML = `<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,${p.bg[0]},${p.bg[1]});flex-shrink:0"></span>Assign to: ${c.name}`;
        item.addEventListener('click', () => { menu.style.display = 'none'; assignNodeToConcept(id, i); });
        dynSection.appendChild(item);
      });
    } else {
      // Offer bridge conversion
      const item = document.createElement('div');
      item.className = 'ctx-item';
      item.textContent = '🔮 Make Bridge Node';
      item.addEventListener('click', () => { menu.style.display = 'none'; ctxAction('make-bridge'); });
      dynSection.appendChild(item);
    }
  }

  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth  - 210) + 'px';
  menu.style.top  = Math.min(e.clientY, window.innerHeight - 280) + 'px';
}

document.addEventListener('click', () => {
  document.getElementById('ctx-menu').style.display = 'none';
  closeExportMenu();
});

function ctxAction(action) {
  const id = state.ctxTarget;
  if (!id) return;
  const node = state.nodes.find(n => n.id === id);
  if (!node) return;
  if (action === 'add-child')   showInlineEditor(id, false);
  else if (action === 'rename') showInlineEditor(id, true);
  else if (action === 'make-bridge') { saveHistory(); node.conceptIdx = 'bridge'; renderAll(); }
  else if (action === 'delete') deleteNode(id);
  document.getElementById('ctx-menu').style.display = 'none';
}

function assignNodeToConcept(id, conceptIdx) {
  const node = state.nodes.find(n => n.id === id);
  if (!node) return;
  saveHistory();
  node.conceptIdx = conceptIdx;
  renderAll();
}

function deleteNode(id) {
  const node = state.nodes.find(n => n.id === id);
  if (!node || node.isRoot) return;
  saveHistory();
  const toDelete = new Set();
  function collect(nid) {
    toDelete.add(nid);
    state.nodes.filter(n => n.parentId === nid).forEach(ch => collect(ch.id));
  }
  collect(id);
  state.nodes = state.nodes.filter(n => !toDelete.has(n.id));
  state.edges = state.edges.filter(e => !toDelete.has(e.from) && !toDelete.has(e.to));
  if (toDelete.has(state.selected)) state.selected = null;
  renderAll();
}

// ── Export ─────────────────────────────────────────────
function toggleExportMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('export-menu');
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

function closeExportMenu() {
  document.getElementById('export-menu').style.display = 'none';
}

function saveMap() {
  const data = {
    version: 1,
    concepts: state.concepts,
    nodes:    state.nodes,
    edges:    state.edges,
    nextId:   state.nextId
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  const name = state.concepts.map(c => c.name).join('-').replace(/[^a-z0-9-]/gi, '_') || 'mindmap';
  a.download = `${name}.json`;
  a.href = URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadMapPicker() {
  const input = document.getElementById('map-file-input');
  input.value = ''; // reset so the same file can be re-loaded
  input.click();
}

function loadMapFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    let data;
    try { data = JSON.parse(e.target.result); } catch {
      alert('Could not read the file — make sure it is a valid mindmap .json file.');
      return;
    }
    if (!data.concepts || !data.nodes || !data.edges) {
      alert('This file does not appear to be a valid mindmap save.');
      return;
    }
    state.concepts  = data.concepts;
    state.nodes     = data.nodes;
    state.edges     = data.edges;
    state.nextId    = data.nextId ?? (data.nodes.length + data.edges.length + 1);
    state.selected  = null;
    state.connectMode  = false;
    state.connectFrom  = null;
    state.dragging     = null;
    state.dragStartPos = null;
    state.history      = [];
    conceptCount = state.concepts.length;
    buildLegend();
    document.getElementById('bridge-zone').style.display = conceptCount === 1 ? 'none' : '';
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    updateConnectBtn();
    updateUndoBtn();
    renderAll();
  };
  reader.readAsText(file);
}

function exportPNG() {
  const W = window.innerWidth, H = window.innerHeight;
  const scale = 2;
  const cvs = document.createElement('canvas');
  cvs.width = W * scale; cvs.height = H * scale;
  const ctx = cvs.getContext('2d');
  ctx.scale(scale, scale);

  // Background
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#1a1a2e'); bg.addColorStop(1, '#0f3460');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Bridge zone ellipse
  if (state.concepts.length > 1) {
    ctx.save();
    ctx.translate(W / 2, H / 2); ctx.scale(1, 1.55);
    ctx.beginPath(); ctx.arc(0, 0, 110, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(139,92,246,0.2)';
    ctx.setLineDash([6, 4]); ctx.lineWidth = 1; ctx.stroke();
    ctx.restore();
  }

  // Edges
  for (const edge of state.edges) {
    const from = state.nodes.find(n => n.id === edge.from);
    const to   = state.nodes.find(n => n.id === edge.to);
    if (!from || !to) continue;
    const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;
    const dx = to.x - from.x,   dy = to.y - from.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) continue;
    const curve = dist * 0.25;
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.quadraticCurveTo(mx + (-dy / dist) * curve, my + (dx / dist) * curve, to.x, to.y);
    if (edge.type === 'connection') {
      ctx.strokeStyle = '#a78bfa'; ctx.setLineDash([7, 4]); ctx.lineWidth = 2; ctx.globalAlpha = 0.8;
    } else {
      ctx.strokeStyle = getPalette(from).edge; ctx.setLineDash([]); ctx.lineWidth = 2; ctx.globalAlpha = 0.65;
    }
    ctx.stroke(); ctx.globalAlpha = 1; ctx.setLineDash([]);
  }

  // Nodes
  for (const node of state.nodes) {
    const el = document.querySelector(`.node[data-id="${node.id}"]`);
    const nw = el ? el.offsetWidth  : (node.isRoot ? 160 : 110);
    const nh = el ? el.offsetHeight : (node.isRoot ?  48 :  38);
    const r  = nh / 2;
    const nx = node.x - nw / 2, ny = node.y - nh / 2;
    const p  = getPalette(node);

    ctx.save();
    // Shadow
    ctx.shadowColor = p.shadow; ctx.shadowBlur = 16;
    // Gradient fill
    const grad = ctx.createLinearGradient(nx, ny, nx + nw, ny + nh);
    grad.addColorStop(0, p.bg[0]); grad.addColorStop(1, p.bg[1]);
    ctx.fillStyle = grad;
    // Pill path
    ctx.beginPath();
    ctx.moveTo(nx + r, ny);
    ctx.lineTo(nx + nw - r, ny);
    ctx.arc(nx + nw - r, ny + r, r, -Math.PI / 2, Math.PI / 2);
    ctx.lineTo(nx + r, ny + nh);
    ctx.arc(nx + r, ny + r, r, Math.PI / 2, 1.5 * Math.PI);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    // Text
    ctx.fillStyle = '#fff';
    ctx.font = `${node.isRoot ? 700 : 600} ${node.isRoot ? 15 : 13}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(node.text, node.x, node.y);
    ctx.restore();
  }

  const a = document.createElement('a');
  a.download = 'mindmap.png'; a.href = cvs.toDataURL('image/png'); a.click();
}
</script>
